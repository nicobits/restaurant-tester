{% extends "reservations/base.html" %}

{% block title %}Log in{% endblock %}

{% block content %}
<section class="form-page">
  <div>
    <h1>Log in</h1>
    <p>Use a demo diner or staff account.</p>
  </div>

  <form method="post" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
  </form>
</section>
{% endblock %}
